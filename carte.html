<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Associations du Comité Départemental — Ille-et-Vilaine</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{--teal:#8C3495;--teal-dark:#6c2774;--ink:#1b2430;--ink-soft:#5a6573;--line:#e3e7ea;--bg:#f7f8f9;--card:#fff;--chip-bg:#f3e7f5;--chip-text:#7a2c82;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--ink);background:var(--bg);}
  .app{display:flex;flex-direction:column;height:100vh;}
  header{display:flex;align-items:center;justify-content:space-between;padding:14px 22px;background:var(--card);border-bottom:3px solid var(--teal);flex-wrap:wrap;gap:10px;}
  .brand{display:flex;align-items:center;gap:14px;}
  .badge35{width:46px;height:46px;border-radius:12px;flex:none;background:linear-gradient(135deg,var(--teal),var(--teal-dark));color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:15px;}
  .brand h1{margin:0;font-size:19px;font-weight:800;}.brand h1 span{color:var(--teal);}
  .brand p{margin:1px 0 0;font-size:12.5px;color:var(--ink-soft);}
  .counts{display:flex;gap:10px;flex-wrap:wrap;}
  .pill{background:#f1f6f7;border:1px solid var(--line);border-radius:999px;padding:7px 14px;font-size:12.5px;color:var(--ink-soft);white-space:nowrap;}
  .pill b{color:var(--teal-dark);font-size:14px;}
  .body{display:flex;flex:1;min-height:0;}
  .sidebar{width:360px;flex:none;background:var(--card);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0;}
  .sidebar-controls{padding:16px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}
  .search-box{position:relative;}
  .search-box input{width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;color:var(--ink);background:#fbfcfc;}
  .search-box input:focus{outline:2px solid var(--teal);outline-offset:-1px;}
  .search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-soft);}
  label.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:700;margin-bottom:2px;}
  select{width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;font-size:13.5px;background:#fbfcfc;color:var(--ink);}
  select:focus{outline:2px solid var(--teal);outline-offset:-1px;}
  .reset-link{align-self:flex-start;border:none;background:none;color:var(--teal-dark);font-size:12.5px;font-weight:700;cursor:pointer;padding:0;text-decoration:underline;}
  .results-count{padding:10px 16px 4px;font-size:12px;color:var(--ink-soft);}
  .list{flex:1;overflow-y:auto;padding:6px 10px 16px;}
  .card{padding:11px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;margin-bottom:4px;transition:background .12s,border-color .12s;}
  .card:hover{background:#f4fafa;}.card.active{background:var(--chip-bg);border-color:var(--teal);}
  .card .name{font-weight:800;font-size:13.5px;margin:0 0 2px;}.card .place{font-size:11.5px;color:var(--ink-soft);margin:0 0 4px;}
  .card .discs{font-size:12px;color:var(--teal-dark);font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .empty{padding:30px 18px;text-align:center;color:var(--ink-soft);font-size:13px;}
  .map-wrap{flex:1;position:relative;min-width:0;}
  #map{position:absolute;inset:0;}

  #overlay{position:absolute;inset:0;background:rgba(247,248,249,.96);z-index:2000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;}
  #overlay h2{margin:0;font-size:17px;font-weight:800;color:var(--ink);}
  #overlay p{margin:0;font-size:13px;color:var(--ink-soft);text-align:center;max-width:320px;}
  .prog-wrap{width:300px;height:9px;background:var(--line);border-radius:99px;overflow:hidden;}
  .prog-fill{height:100%;background:var(--teal);border-radius:99px;width:0%;transition:width .25s;}
  #overlay-status{font-size:12px;color:var(--ink-soft);max-width:320px;text-align:center;}

  .leaflet-popup-content-wrapper{padding:0;border-radius:10px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.18);}
  .leaflet-popup-content{margin:0;width:290px!important;}
  .pop-head{background:var(--ink);color:#fff;padding:11px 14px;}
  .pop-head .pname{font-weight:800;font-size:14px;margin:0;}
  .pop-head .ploc{font-size:11.5px;color:#8fd9de;text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
  .pop-body{padding:12px 14px;background:#fff;}
  .pop-row{display:flex;gap:8px;font-size:12.5px;color:var(--ink);margin-bottom:7px;align-items:flex-start;}
  .pop-row svg{flex:none;width:14px;height:14px;margin-top:1px;color:var(--teal-dark);}
  .pop-row a{color:var(--teal-dark);text-decoration:none;}
  .pop-row a:hover{text-decoration:underline;}
  .pop-chips{display:flex;flex-wrap:wrap;gap:5px;}
  .chip{background:var(--chip-bg);color:var(--chip-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;}
  .leaflet-popup-tip-container{display:none;}
  .marker-dot{width:16px;height:16px;border-radius:50%;background:var(--teal);border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);}
  .marker-dot.sel{background:#c46bcd;width:20px;height:20px;}
  @media(max-width:760px){.body{flex-direction:column;}.sidebar{width:100%;height:42%;border-right:none;border-bottom:1px solid var(--line);}.map-wrap{height:58%;}}
</style>
</head>

let ASSOCS = [];
let map, layerGroup;
const markerById = {};
let activeId = null;
const CACHE_KEY = 'cd35_v3';

function initMap(){
  map = L.map('map',{scrollWheelZoom:true}).setView([48.18,-1.6],10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'&copy; OpenStreetMap'}).addTo(map);
  layerGroup = L.layerGroup().addTo(map);
}

function dotIcon(sel){
  return L.divIcon({className:'',html:`<div class="marker-dot${sel?' sel':''}"></div>`,iconSize:[20,20],iconAnchor:[10,10],popupAnchor:[0,-12]});
}

function popupHtml(a){
  const iconAddr = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-7.1-7-12a7 7 0 1 1 14 0c0 4.9-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>`;
  const iconDisc = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M12 8v4l3 3"/></svg>`;
  const iconMail = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>`;
  const iconPhone = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2A19.79 19.79 0 0 1 11.61 19a19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 3.09 4.18 2 2 0 0 1 5.07 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L9.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>`;
  const iconWeb = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>`;

  let contactRows = '';
  if(a.email) contactRows += `<div class="pop-row">${iconMail}<span><a href="mailto:${a.email}">${a.email}</a></span></div>`;
  if(a.phone) contactRows += `<div class="pop-row">${iconPhone}<span><a href="tel:${a.phone}">${a.phone}</a></span></div>`;
  if(a.website) {
    const url = a.website.startsWith('http') ? a.website : 'https://'+a.website;
    contactRows += `<div class="pop-row">${iconWeb}<span><a href="${url}" target="_blank" rel="noopener">${a.website.replace(/^https?:\/\//,'')}</a></span></div>`;
  }

  return `<div class="pop-head">
    <p class="pname">${a.name}</p>
    <div class="ploc">${a.city} · ${a.postcode}</div>
  </div>
  <div class="pop-body">
    <div class="pop-row">${iconAddr}<span>${a.q}, ${a.postcode} ${a.city}</span></div>
    ${contactRows}
    <div class="pop-row" style="margin-bottom:0">${iconDisc}<div class="pop-chips">${a.disciplines.map(d=>`<span class="chip">${d}</span>`).join('')}</div></div>
  </div>`;
}

async function loadData(){
  try{
    const r = await fetch('./data.json?v='+Date.now());
    if(r.ok){
      const data = await r.json();
      if(Array.isArray(data) && data.length){
        document.getElementById('overlay').style.display='none';
        return data.map((a,i)=>({email:'',phone:'',website:'',...a,id:i}));
      }
    }
  }catch(e){}

  let cache = {};
  try{ cache = JSON.parse(localStorage.getItem(CACHE_KEY)||'{}'); }catch(e){}
  const fill = document.getElementById('progFill');
  const status = document.getElementById('overlay-status');
  const results = [];
  for(let i=0;i<RAW.length;i++){
    const a = RAW[i];
    fill.style.width=(i/RAW.length*100)+'%';
    status.textContent=`${i+1}/${RAW.length} — ${a.name}`;
    if(cache[a.name]){
      results.push({...a,id:i,...cache[a.name],email:'',phone:'',website:''});
    } else {
      try{
        const url=`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(a.q)}&postcode=${a.postcode}&limit=1`;
        const r=await fetch(url);
        const d=await r.json();
        let coords=null;
        if(d.features&&d.features.length){const [lon,lat]=d.features[0].geometry.coordinates;coords={lat,lon};}
        else{
          const r2=await fetch(`https://api-adresse.data.gouv.fr/search/?q=${encodeURIComponent(a.city)}&postcode=${a.postcode}&limit=1`);
          const d2=await r2.json();
          if(d2.features&&d2.features.length){const [lon,lat]=d2.features[0].geometry.coordinates;coords={lat,lon};}
        }
        if(coords){cache[a.name]=coords;results.push({...a,id:i,...coords,email:'',phone:'',website:''});}
        else results.push({...a,id:i,lat:48.18,lon:-1.6,email:'',phone:'',website:''});
      }catch(e){results.push({...a,id:i,lat:48.18,lon:-1.6,email:'',phone:'',website:''});}
      await new Promise(r=>setTimeout(r,120));
    }
  }
  fill.style.width='100%';
  try{localStorage.setItem(CACHE_KEY,JSON.stringify(cache));}catch(e){}
  document.getElementById('overlay').style.display='none';
  return results;
}

function buildMarkers(){
  ASSOCS.forEach(a=>{
    const m=L.marker([a.lat,a.lon],{icon:dotIcon(false)});
    m.bindPopup(popupHtml(a),{maxWidth:310});
    m.on('click',()=>setActive(a.id,false));
    markerById[a.id]=m;
    layerGroup.addLayer(m);
  });
}

function populateSelects(){
  const sa=document.getElementById('assocSelect');
  ASSOCS.slice().sort((a,b)=>a.name.localeCompare(b.name,'fr')).forEach(a=>{
    const o=document.createElement('option');o.value=a.name;o.textContent=a.name;sa.appendChild(o);
  });
  const set=new Set();
  ASSOCS.forEach(a=>a.disciplines.forEach(d=>{if(d!=='Non précisée')set.add(d);}));
  const sd=document.getElementById('discSelect');
  Array.from(set).sort((a,b)=>a.localeCompare(b,'fr')).forEach(d=>{
    const o=document.createElement('option');o.value=d;o.textContent=d;sd.appendChild(o);
  });
  document.getElementById('totalCount').textContent=ASSOCS.length;
  document.getElementById('discCount').textContent=set.size;
}

function matches(a,q,disc,assocName){
  if(assocName&&a.name!==assocName)return false;
  if(disc&&!a.disciplines.includes(disc))return false;
  if(!q)return true;
  return (a.name+' '+a.city+' '+a.disciplines.join(' ')).toLowerCase().includes(q);
}

function renderList(filtered){
  const list=document.getElementById('list');
  list.innerHTML='';
  if(!filtered.length){list.innerHTML='<div class="empty">Aucune association trouvée.</div>';return;}
  filtered.forEach(a=>{
    const d=document.createElement('div');
    d.className='card'+(a.id===activeId?' active':'');
    d.innerHTML=`<p class="name">${a.name}</p><p class="place">${a.city} · ${a.postcode}</p><p class="discs">${a.disciplines.join(', ')}</p>`;
    d.addEventListener('click',()=>setActive(a.id,true));
    list.appendChild(d);
  });
}

function setActive(id,fromList){
  if(activeId!==null&&markerById[activeId])markerById[activeId].setIcon(dotIcon(false));
  activeId=id;
  const a=ASSOCS.find(x=>x.id===id);
  if(!a)return;
  markerById[id].setIcon(dotIcon(true));
  if(fromList){
    map.flyTo([a.lat,a.lon],16,{duration:0.5});
    setTimeout(()=>markerById[id].openPopup(),400);
  }else{
    markerById[id].openPopup();
  }
  applyFilters(false);
}

function applyFilters(rebuild=true){
  const q=document.getElementById('searchInput').value.trim().toLowerCase();
  const disc=document.getElementById('discSelect').value;
  const assocName=document.getElementById('assocSelect').value;
  const filtered=ASSOCS.filter(a=>matches(a,q,disc,assocName));
  document.getElementById('shownCount').textContent=filtered.length;
  document.getElementById('resultsLabel').textContent=filtered.length+' association'+(filtered.length!==1?'s':'')+' trouvée'+(filtered.length!==1?'s':'');
  renderList(filtered);
  if(rebuild){
    layerGroup.clearLayers();
    const ids=new Set(filtered.map(a=>a.id));
    Object.entries(markerById).forEach(([id,m])=>{if(ids.has(+id))layerGroup.addLayer(m);});
  }
  if(assocName&&filtered.length===1&&activeId!==filtered[0].id)setActive(filtered[0].id,true);
}

document.addEventListener('DOMContentLoaded',async()=>{
  initMap();
  ASSOCS = await loadData();
  buildMarkers();
  populateSelects();
  applyFilters();
  document.getElementById('searchInput').addEventListener('input',()=>applyFilters());
  document.getElementById('assocSelect').addEventListener('change',()=>applyFilters());
  document.getElementById('discSelect').addEventListener('change',()=>applyFilters());
  document.getElementById('resetBtn').addEventListener('click',()=>{
    document.getElementById('searchInput').value='';
    document.getElementById('assocSelect').value='';
    document.getElementById('discSelect').value='';
    applyFilters();
  });
});
</script>
</body>
</html>
