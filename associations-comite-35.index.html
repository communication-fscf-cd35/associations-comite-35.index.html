<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Associations du Comité Départemental — Ille-et-Vilaine</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
  :root{
    --teal:#8C3495;
    --teal-dark:#6c2774;
    --ink:#1b2430;
    --ink-soft:#5a6573;
    --line:#e3e7ea;
    --bg:#f7f8f9;
    --card:#ffffff;
    --chip-bg:#f3e7f5;
    --chip-text:#7a2c82;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;color:var(--ink);background:var(--bg);}
  .app{display:flex;flex-direction:column;height:100vh;}

  /* ---------- HEADER ---------- */
  header{
    display:flex;align-items:center;justify-content:space-between;
    padding:14px 22px;background:var(--card);border-bottom:3px solid var(--teal);
    flex-wrap:wrap;gap:10px;
  }
  .brand{display:flex;align-items:center;gap:14px;}
  .badge35{
    width:46px;height:46px;border-radius:12px;flex:none;
    background:linear-gradient(135deg,var(--teal),var(--teal-dark));
    color:#fff;display:flex;align-items:center;justify-content:center;
    font-weight:800;font-size:15px;letter-spacing:.5px;
  }
  .brand h1{margin:0;font-size:19px;font-weight:800;color:var(--ink);}
  .brand h1 span{color:var(--teal);}
  .brand p{margin:1px 0 0;font-size:12.5px;color:var(--ink-soft);}
  .counts{display:flex;gap:10px;flex-wrap:wrap;}
  .pill{
    background:#f1f6f7;border:1px solid var(--line);border-radius:999px;
    padding:7px 14px;font-size:12.5px;color:var(--ink-soft);white-space:nowrap;
  }
  .pill b{color:var(--teal-dark);font-size:14px;}

  /* ---------- BODY LAYOUT ---------- */
  .body{display:flex;flex:1;min-height:0;}
  .sidebar{
    width:360px;flex:none;background:var(--card);border-right:1px solid var(--line);
    display:flex;flex-direction:column;min-height:0;
  }
  .sidebar-controls{padding:16px;border-bottom:1px solid var(--line);display:flex;flex-direction:column;gap:10px;}
  .search-box{position:relative;}
  .search-box input{
    width:100%;padding:10px 12px 10px 34px;border:1px solid var(--line);border-radius:9px;
    font-size:13.5px;color:var(--ink);background:#fbfcfc;
  }
  .search-box input:focus{outline:2px solid var(--teal);outline-offset:-1px;border-color:var(--teal);}
  .search-box svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--ink-soft);}
  label.field-label{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--ink-soft);font-weight:700;margin-bottom:2px;}
  select{
    width:100%;padding:9px 10px;border:1px solid var(--line);border-radius:9px;
    font-size:13.5px;background:#fbfcfc;color:var(--ink);
  }
  select:focus{outline:2px solid var(--teal);outline-offset:-1px;}
  .reset-link{
    align-self:flex-start;border:none;background:none;color:var(--teal-dark);
    font-size:12.5px;font-weight:700;cursor:pointer;padding:0;text-decoration:underline;
  }
  .results-count{padding:10px 16px 4px;font-size:12px;color:var(--ink-soft);}
  .list{flex:1;overflow-y:auto;padding:6px 10px 16px;}
  .card{
    padding:11px 12px;border-radius:10px;cursor:pointer;border:1px solid transparent;
    margin-bottom:4px;transition:background .12s,border-color .12s;
  }
  .card:hover{background:#f4fafa;}
  .card.active{background:var(--chip-bg);border-color:var(--teal);}
  .card .name{font-weight:800;font-size:13.5px;color:var(--ink);margin:0 0 2px;}
  .card .place{font-size:11.5px;color:var(--ink-soft);margin:0 0 4px;}
  .card .discs{font-size:12px;color:var(--teal-dark);font-weight:600;line-height:1.4;
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
  .empty{padding:30px 18px;text-align:center;color:var(--ink-soft);font-size:13px;}

  /* ---------- MAP ---------- */
  .map-wrap{flex:1;position:relative;min-width:0;}
  #map{position:absolute;inset:0;background:#e9edee;}
  .leaflet-popup-content-wrapper{padding:0;border-radius:10px;overflow:hidden;box-shadow:0 10px 30px rgba(0,0,0,.18);}
  .leaflet-popup-content{margin:0;width:280px !important;}
  .pop-head{background:var(--ink);color:#fff;padding:11px 14px;}
  .pop-head .pname{font-weight:800;font-size:14px;margin:0;}
  .pop-head .ploc{font-size:11.5px;color:#8fd9de;text-transform:uppercase;letter-spacing:.03em;margin-top:2px;}
  .pop-body{padding:12px 14px;background:#fff;}
  .pop-row{display:flex;gap:8px;font-size:12.5px;color:var(--ink);margin-bottom:8px;align-items:flex-start;}
  .pop-row svg{flex:none;width:14px;height:14px;margin-top:1px;color:var(--teal-dark);}
  .pop-chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:2px;}
  .chip{background:var(--chip-bg);color:var(--chip-text);font-size:11px;font-weight:700;padding:3px 8px;border-radius:999px;}
  .leaflet-popup-tip-container{display:none;}
  .marker-dot{
    width:16px;height:16px;border-radius:50%;background:var(--teal);
    border:2.5px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);
  }
  .marker-dot.sel{background:#c46bcd;width:20px;height:20px;}

  @media (max-width:760px){
    .body{flex-direction:column;}
    .sidebar{width:100%;height:42%;border-right:none;border-bottom:1px solid var(--line);}
    .map-wrap{height:58%;}
  }
</style>
</head>

    <div class="brand">
      <div class="badge35">35</div>

        <h1>Associations du <span>Comité Départemental</span></h1>

      </div>
    </div>
    <div class="counts">

      <div class="pill"><b id="shownCount">0</b> affichées</div>
      <div class="pill"><b id="discCount">0</b> disciplines</div>
    </div>
  </header>

  <div class="body">
    <aside class="sidebar">
      <div class="sidebar-controls">
        <div class="search-box">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4.3-4.3"/></svg>
          <input id="searchInput" type="text" placeholder="Rechercher une association, une ville…">
        </div>
        <div>
          <label class="field-label" for="assocSelect">Association</label>
          <select id="assocSelect"><option value="">Toutes les associations</option></select>
        </div>
        <div>
          <label class="field-label" for="discSelect">Discipline</label>

        </div>
        <button class="reset-link" id="resetBtn">Réinitialiser les filtres</button>
      </div>
      <div class="results-count"><span id="resultsLabel">0 associations trouvées</span></div>
      <div class="list" id="list"></div>
    </aside>

    <main class="map-wrap">
      <div id="map"></div>
    </main>
  </div>
</div>

let map, markersLayer;
const markerById = {};
let activeId = null;

function initMap(){
  map = L.map('map', {scrollWheelZoom:true}).setView([48.18,-1.55], 10);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
    attribution: '&copy; OpenStreetMap contributors'
  }).addTo(map);
  markersLayer = L.layerGroup().addTo(map);
}

function dotIcon(selected){
  return L.divIcon({
    className:'',
    html:`<div class="marker-dot${selected?' sel':''}"></div>`,
    iconSize:[20,20], iconAnchor:[10,10], popupAnchor:[0,-10]
  });
}

function popupHtml(a){
  const chips = a.disciplines.map(d=>`<span class="chip">${d}</span>`).join('');
  return `
    <div class="pop-head">
      <p class="pname">${a.name}</p>
      <div class="ploc">${a.city||''}${a.postal_code? ' · '+a.postal_code:''}</div>
    </div>
    <div class="pop-body">
      <div class="pop-row">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 21s-7-7.1-7-12a7 7 0 1 1 14 0c0 4.9-7 12-7 12z"/><circle cx="12" cy="9" r="2.5"/></svg>
        <span>${a.address}</span>
      </div>
      <div class="pop-row" style="margin-bottom:0;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z" opacity="0"/><path d="M3 4l9 6 9-6M3 4h18v14H3z"/></svg>
        <div class="pop-chips">${chips}</div>
      </div>
    </div>`;
}

function buildMarkers(){
  ASSOCIATIONS.forEach(a=>{
    const m = L.marker([a.lat, a.lon], {icon:dotIcon(false)});
    m.bindPopup(popupHtml(a));
    m.on('click', ()=>setActive(a.id, false));
    markerById[a.id] = m;
  });
}

function populateAssociations(){
  const sel = document.getElementById('assocSelect');
  const sorted = ASSOCIATIONS.slice().sort((a,b)=>a.name.localeCompare(b.name,'fr'));
  sorted.forEach(a=>{
    const opt = document.createElement('option');
    opt.value = a.name; opt.textContent = a.name;
    sel.appendChild(opt);
  });
}

function populateDisciplines(){
  const set = new Set();
  ASSOCIATIONS.forEach(a=>a.disciplines.forEach(d=>{ if(d!=='Non précisée') set.add(d); }));
  const sorted = Array.from(set).sort((a,b)=>a.localeCompare(b,'fr'));
  const sel = document.getElementById('discSelect');
  sorted.forEach(d=>{
    const opt = document.createElement('option');
    opt.value = d; opt.textContent = d;
    sel.appendChild(opt);
  });
  document.getElementById('discCount').textContent = sorted.length;
  document.getElementById('totalCount').textContent = ASSOCIATIONS.length;
}

function matches(a, q, disc, assocName){
  if(assocName && a.name !== assocName) return false;
  if(disc && !a.disciplines.includes(disc)) return false;
  if(!q) return true;
  const hay = (a.name+' '+(a.city||'')+' '+a.disciplines.join(' ')).toLowerCase();
  return hay.includes(q);
}

function renderList(filtered){
  const list = document.getElementById('list');
  list.innerHTML = '';
  if(filtered.length===0){
    list.innerHTML = '<div class="empty">Aucune association ne correspond à votre recherche.</div>';
    return;
  }
  filtered.forEach(a=>{
    const div = document.createElement('div');
    div.className = 'card'+(a.id===activeId?' active':'');
    div.innerHTML = `
      <p class="name">${a.name}</p>
      <p class="place">${a.city||''}${a.postal_code? ' · '+a.postal_code:''}</p>
      <p class="discs">${a.disciplines.join(', ')}</p>`;
    div.addEventListener('click', ()=>setActive(a.id, true));
    list.appendChild(div);
  });
}

function setActive(id, fromList){
  if(activeId!==null && markerById[activeId]) markerById[activeId].setIcon(dotIcon(false));
  activeId = id;
  const a = ASSOCIATIONS.find(x=>x.id===id);
  if(!a) return;
  markerById[id].setIcon(dotIcon(true));
  if(fromList){
    map.flyTo([a.lat,a.lon], 13, {duration:0.6});
    setTimeout(()=>markerById[id].openPopup(), 350);
  } else {
    markerById[id].openPopup();
  }
  applyFilters(false);
}

function applyFilters(rebuildMarkers=true){
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  const disc = document.getElementById('discSelect').value;
  const assocName = document.getElementById('assocSelect').value;
  const filtered = ASSOCIATIONS.filter(a=>matches(a,q,disc,assocName));

  document.getElementById('shownCount').textContent = filtered.length;
  document.getElementById('resultsLabel').textContent = filtered.length+' association'+(filtered.length===1?'':'s')+' trouvée'+(filtered.length===1?'':'s');
  renderList(filtered);

  if(rebuildMarkers){
    markersLayer.clearLayers();
    const filteredIds = new Set(filtered.map(a=>a.id));
    Object.entries(markerById).forEach(([id,m])=>{
      if(filteredIds.has(Number(id))) markersLayer.addLayer(m);
    });
  }

  if(assocName && filtered.length===1 && activeId!==filtered[0].id){
    setActive(filtered[0].id, true);
  }
}

document.addEventListener('DOMContentLoaded', ()=>{
  ASSOCIATIONS.forEach((a,i)=>a.id=i);
  initMap();
  buildMarkers();
  populateAssociations();
  populateDisciplines();
  applyFilters();

  document.getElementById('searchInput').addEventListener('input', ()=>applyFilters());
  document.getElementById('assocSelect').addEventListener('change', ()=>applyFilters());
  document.getElementById('discSelect').addEventListener('change', ()=>applyFilters());
  document.getElementById('resetBtn').addEventListener('click', ()=>{
    document.getElementById('searchInput').value='';
    document.getElementById('assocSelect').value='';
    document.getElementById('discSelect').value='';
    applyFilters();
  });
});
</script>
</body>
</html>
